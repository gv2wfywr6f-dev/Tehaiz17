<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tahreen & Faiz | Nikah Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Poppins:wght@300;400;500&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- ===========================
COVER PAGE
=========================== -->

<section id="cover">

<div class="overlay"></div>

<div class="cover-content">

<p class="arabic">
بِسْمِ اللَّهِ الرَّحْمٰنِ الرَّحِيمِ
</p>

<h1 class="initials">
T <span>&</span> F
</h1>

<h2 class="names">
Tahreen ♡ Faiz
</h2>

<p class="subtitle">
Together With Their Families Invite You
To Celebrate Their Blessed Nikah
</p>

<button id="openInvitation">
Open Invitation
</button>

</div>

</section>



<!-- ===========================
ENVELOPE
=========================== -->

<section id="envelopeSection">

<div class="envelope">

<div class="envelope-back"></div>

<div class="letter">

<h2>Tahreen ♡ Faiz</h2>

<p>Tap the Seal to Open</p>

<div id="seal">
🌹
</div>

</div>

<div class="flap"></div>

</div>

</section>



<audio id="bgMusic" loop>
<source src="audio/nasheed.mp3" type="audio/mpeg">
</<!-- ===========================
SCRATCH DATE PAGE
=========================== -->

<section id="scratchSection">

<h2>Our Special Day</h2>

<div class="scratch-card">

<div class="date-card">

<h3>Friday</h3>

<h1>04</h1>

<h2>December 2026</h2>

<p>After Maghrib • 7:00 PM</p>

</div>

<canvas id="scratchCanvas"></canvas>

</div>

<p class="scratch-text">
✨ Scratch the card to reveal our wedding date ✨
</p>

</section>



<!-- ===========================
MAIN INVITATION
=========================== -->

<section id="invitation">

<p class="arabic">
بِسْمِ اللَّهِ الرَّحْمٰنِ الرَّحِيمِ
</p>

<h1>
Tahreen <span>&</span> Faiz
</h1>

<img
src="images/pakistani-couple.png"
class="couple"
alt="Pakistani Couple">

<p class="welcome">

Together with our families,

we request the honour of your presence

at our Nikah Ceremony.

</p>



<div class="info-card">

<h3>🕌 Nikah</h3>

<p>
Friday • 4 December 2026
</p>

<p>
After Maghrib • 7:00 PM
</p>

</div>



<div class="info-card">

<h3>📍 Venue</h3>

<p>

Ahmed Lawn Hall

<br>

Next to Petrol Pump

<br>

Mumbra

</p>

</div>




<section class="countdown">

<h2>Countdown</h2>

<div id="timer">

<div>

<span id="days">00</span>

<small>Days</small>

</div>

<div>

<span id="hours">00</span>

<small>Hours</small>

</div>

<div>

<span id="minutes">00</span>

<small>Minutes</small>

</div>

<div>

<span id="seconds">00</span>

<small>Seconds</small>

</div>

</div>

</section>




<section class="dua">

<h2>Dua</h2>

<h3>

بارك الله لكما وبارك عليكما وجمع بينكما في خير

</h3>

<p>

May Allah bless both of you

and unite you in goodness.

</p>

</section>



<footer>

Made with ❤️

For

Tahreen ♡ Faiz

</footer>

</section>

<script src="script.js"></script>

</body>
</html>
